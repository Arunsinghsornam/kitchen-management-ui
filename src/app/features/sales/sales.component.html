<div class="sales-page">

<div class="page-header">
  <div>
    <h1>Sales Management</h1>
    <p>Record and manage outlet sales</p>
  </div>

  <button class="btn-primary" (click)="newSale()">
    + New Sale
  </button>
</div>

  <div class="sales-card">


<table class="sales-table">

  <thead>
    <tr>
      <th>Date</th>
      <th>Channel</th>
      <th>Subtotal</th>
      <th>Discount</th>
      <th>Total</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let s of sales">

      <td>{{ s.saleDate }}</td>

      <td>
        <span class="badge">
          {{ s.channel }}
        </span>
      </td>

      <td>₹{{ s.subtotal }}</td>

      <td>₹{{ s.discount }}</td>

      <td class="amount">
        ₹{{ s.total }}
      </td>

    </tr>

    <tr *ngIf="sales.length === 0">
      <td colspan="5" style="text-align:center">
        No sales found
      </td>
    </tr>

  </tbody>

</table>


  </div>

  <!-- Modal -->

  <div
    class="modal-overlay"
    *ngIf="showModal">


<div class="modal-card">

  <div class="modal-header">

    <h2>New Sale</h2>

    <button
      class="close-btn"
      (click)="showModal=false">
      ✕
    </button>

  </div>

  <div class="form-group">

    <label>Channel</label>

    <select [(ngModel)]="sale.channel">

      <option value="OUTLET">
        OUTLET
      </option>

      <option value="SWIGGY">
        SWIGGY
      </option>

      <option value="ZOMATO">
        ZOMATO
      </option>

    </select>

  </div>

  <button
    class="btn-secondary"
    (click)="addItem()">

    + Add Item

  </button>

  <div
    class="sale-item-row"
    *ngFor="let item of sale.items; let i=index">

    <select
      [(ngModel)]="item.menuItemId"
      (change)="onMenuChange(item)">

      <option value="">
        Select Menu Item
      </option>

      <option
        *ngFor="let m of menuItems"
        [ngValue]="m.id">

        {{ m.name }}

      </option>

    </select>

    <input
      type="number"
      [(ngModel)]="item.quantity"
      placeholder="Qty">

    <input
      type="number"
      [(ngModel)]="item.unitPrice"
      placeholder="Price">

    <button
      class="remove-btn"
      (click)="removeItem(i)">
      Remove
    </button>

  </div>

  <div class="totals">

    <p>
      <strong>Subtotal:</strong>
      ₹{{ subtotal }}
    </p>

    <div class="form-group">

      <label>Discount</label>

      <input
        type="number"
        [(ngModel)]="sale.discount">

    </div>

    <p>
      <strong>Total:</strong>
      ₹{{ total }}
    </p>

  </div>

  <div class="modal-actions">

    <button
      class="btn-primary"
      (click)="saveSale()">

      Save Sale

    </button>

    <button
      class="btn-secondary"
      (click)="showModal=false">

      Cancel

    </button>

  </div>

</div>


  </div>

</div>
