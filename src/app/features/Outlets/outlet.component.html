<div class="outlet-page">

  <!-- Page Header -->
  <div class="page-header" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
    <div>
      <h2>🏢 Outlet Management</h2>
      <p>Manage all outlets across organizations.</p>
    </div>

    <div style="display: flex; align-items: center; gap: 15px;">
      <!-- Organization filter for Power Admin -->
      <select *ngIf="isPowerAdmin" [(ngModel)]="selectedOrganizationId" (change)="onOrganizationChange()"
              style="padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; background: white; outline: none; min-width: 180px; font-weight: 600;">
        <option value="">All Organizations</option>
        <option *ngFor="let org of organizations" [value]="org.id">
          {{ org.name }}
        </option>
      </select>

      <button class="btn-primary" (click)="openAddForm()" *ngIf="!showForm">
        ➕ Add Outlet
      </button>
    </div>
  </div>

  <!-- Form Card -->
  <div class="outlet-card" *ngIf="showForm">
    <h3>{{ isEditMode ? 'Edit Outlet' : 'Add Outlet' }}</h3>
    <div class="form-row">

      <!-- Organization select in form for Power Admin -->
      <div class="form-group" *ngIf="isPowerAdmin">
        <label>Organization</label>
        <select [(ngModel)]="newOutlet.organizationId"
                style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
          <option value="">-- Select Organization --</option>
          <option *ngFor="let org of organizations" [value]="org.id">
            {{ org.name }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Outlet Name</label>
        <input type="text"
               [(ngModel)]="newOutlet.name"
               placeholder="Enter outlet name">
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text"
               [(ngModel)]="newOutlet.address"
               placeholder="Enter outlet address">
      </div>

    </div>

    <div style="display:flex; gap:10px; margin-top: 20px;">
      <button class="btn-primary" (click)="saveOutlet()">
        {{ isEditMode ? '💾 Update Outlet' : '💾 Save Outlet' }}
      </button>
      <button class="btn-secondary" (click)="cancelEdit()">
        Cancel
      </button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="table-card">
    <table class="outlet-table">

      <thead>
        <tr>
          <th>S.No</th>
          <th>Outlet Name</th>
          <th>Address</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let outlet of outlets; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ outlet.name }}</td>
          <td>{{ outlet.address }}</td>
          <td>
            <button class="action-btn edit-btn"
                    (click)="editOutlet(outlet)">
              ✏ Edit
            </button>
            <button class="action-btn delete-btn"
                    (click)="deleteOutlet(outlet.id)">
              🗑 Delete
            </button>
          </td>
        </tr>

        <tr *ngIf="outlets.length === 0">
          <td colspan="4" style="text-align:center; color:#777;">
            No outlets found
          </td>
        </tr>

      </tbody>

    </table>
  </div>

</div>
